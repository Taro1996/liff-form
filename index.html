<script>
  const LIFF_ID = "2008405271-qoGVB0DW";

  let lineUserId = "";
  let lineDisplayName = "";

  async function initializeLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUserId = profile.userId;
      lineDisplayName = profile.displayName || "";

      document.getElementById("name").value = lineDisplayName;
      document.getElementById("lineNameBox").textContent =
        "LINE表示名：" + lineDisplayName;
    } catch (error) {
      showError("LIFFの初期化に失敗しました。設定を確認してください。");
      console.error(error);
    }
  }

  function showError(message) {
    const errorBox = document.getElementById("errorMessage");
    const successBox = document.getElementById("successMessage");
    successBox.style.display = "none";
    errorBox.textContent = message;
    errorBox.style.display = "block";
  }

  function showSuccess(message) {
    const successBox = document.getElementById("successMessage");
    const errorBox = document.getElementById("errorMessage");
    errorBox.style.display = "none";
    successBox.textContent = message;
    successBox.style.display = "block";
  }

  document.getElementById("registerForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const button = document.getElementById("submitBtn");

    if (!email) {
      showError("メールアドレスを入力してください。");
      return;
    }

    button.disabled = true;
    button.textContent = "登録中...";

    try {
      const response = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          lineUserId: lineUserId,
          name: lineDisplayName,
          email: email
        })
      });

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.message || "登録に失敗しました。");
      }

      showSuccess("登録が完了しました。\nLINE連携ページへ移動します。");

      document.getElementById("registerForm").style.display = "none";

      setTimeout(() => {
        window.location.href = "https://eda-livestock-ec.com/account";
      }, 1500);

    } catch (error) {
      console.error(error);
      showError(error.message || "登録時にエラーが発生しました。");
    } finally {
      button.disabled = false;
      button.textContent = "こちらをタップ";
    }
  });

  initializeLiff();
</script>
